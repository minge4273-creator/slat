backend:
  name: github
  repo: Minge4273-creator/slat
  branch: main
  # 关键：脱离 Netlify 后，必须配置一个轻量级的验证代理服务器
  # 你可以使用社区免费提供的公共代理，或者自己用 Vercel/Heroku 部署一个
  base_url: https://decap-cms-oauth-provider.netlify.app # 这是一个示例公共代理
  
media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Slat Panels"
    folder: "src/content/products" 
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Product Name", name: "title", widget: "string"}
      - {label: "Material", name: "material", widget: "string"}
      - {label: "Color", name: "color", widget: "string"}
      - {label: "Feature Image", name: "image", widget: "image"}
      - {label: "Body", name: "body", widget: "markdown"}
